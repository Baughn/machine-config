---
- name: Ensure magic-reboot config directory exists
  file:
    path: /etc/magic-reboot
    state: directory
    mode: "0750"
    group: wheel

- name: Deploy magic-reboot listener key
  copy:
    src: /home/svein/.config/agenix/magic-reboot.key
    dest: "{{ magic_reboot_key_file }}"
    remote_src: true
    mode: "0440"
    owner: root
    group: wheel
  no_log: true

- name: Install DKMS
  pacman:
    name: dkms
    state: present

- name: Deploy magic-reboot DKMS module source
  synchronize:
    src: "{{ playbook_dir }}/../tools/magic-reboot/module/"
    dest: /usr/src/magic-reboot-0.1/
    recursive: true
  notify: rebuild dkms

- name: Add magic-reboot DKMS module
  command: dkms add magic-reboot/0.1
  args:
    creates: /var/lib/dkms/magic-reboot/0.1
  notify: rebuild dkms

- name: Ensure magic-reboot DKMS module is built for current kernel
  command: dkms install magic-reboot/0.1
  register: dkms_install
  changed_when: "'already installed' not in dkms_install.stderr"
  failed_when: "dkms_install.rc != 0 and 'already installed' not in dkms_install.stderr"

- name: Build DKMS modules before loading
  meta: flush_handlers

- name: Load magic_reboot kernel module
  modprobe:
    name: magic_reboot
    params: "port={{ magic_reboot_port }} key_path={{ magic_reboot_key_file }} dryrun=0"
    state: present

- name: Persist module load on boot
  copy:
    dest: /etc/modules-load.d/magic-reboot.conf
    content: "magic_reboot\n"
    mode: "0644"

- name: Persist module parameters
  copy:
    dest: /etc/modprobe.d/magic-reboot.conf
    content: "options magic_reboot port={{ magic_reboot_port }} key_path={{ magic_reboot_key_file }} dryrun=0\n"
    mode: "0644"

- name: Enable SysRq reboot command
  sysctl:
    name: kernel.sysrq
    value: "128"
    sysctl_file: /etc/sysctl.d/90-magic-reboot.conf
    reload: true
