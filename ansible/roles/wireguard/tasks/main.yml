---
- name: Install wireguard-tools
  pacman:
    name: wireguard-tools
    state: present

- name: Create WireGuard config directory
  file:
    path: /etc/wireguard
    state: directory
    mode: "0711"

- name: Deploy WireGuard private key
  copy:
    src: /home/svein/.config/agenix/wireguard-saya
    dest: "{{ wireguard_private_key_file }}"
    remote_src: true
    mode: "0600"
    owner: systemd-network
    group: systemd-network
  no_log: true
  notify: restart wireguard

- name: Create WireGuard netdev
  template:
    src: wg0.netdev.j2
    dest: /etc/systemd/network/50-wg0.netdev
    mode: "0640"
    owner: root
    group: systemd-network
  notify: restart wireguard

- name: Create WireGuard network
  template:
    src: wg0.network.j2
    dest: /etc/systemd/network/50-wg0.network
    mode: "0644"
  notify: restart wireguard

- name: Enable systemd-networkd
  systemd:
    name: systemd-networkd
    enabled: true
    state: started
